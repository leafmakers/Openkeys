<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>keycastle</title>
    <link rel="stylesheet" href="./src/styles/tokens.css">
    <link rel="stylesheet" href="./src/styles/base.css">
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav id="navbar">
      <div class="navbar-content">
        <h1 class="navbar-title" aria-label="keycastle">
          <span class="keycastle-hover-state">
            <canvas
              class="keycastle-cube"
              id="keycastleCube"
              data-ok-role="view-cube"
              role="img"
              aria-label="View cube — click a face to snap the keyboard view"
            ></canvas>
            <span class="keycastle-wordmark" aria-hidden="true">keycastle</span>
          </span>
        </h1>
        <div id="navbarActions">
          <div id="fontControls">
            <button id="fontPrev" aria-label="Previous font">←</button>
            <button id="fontLibraryTrigger" class="font-name-trigger" aria-haspopup="dialog" aria-expanded="false" title="Change font">
              <span class="font-icon" aria-hidden="true">Aa</span>
              <span id="fontName">System</span>
              <span class="font-name-caret">▾</span>
            </button>
            <button id="fontNext" aria-label="Next font">→</button>
          </div>
          <button id="samplePhrase" aria-label="Type a sample phrase" title="Type a sample phrase">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5h16M4 12h16M4 17.5h10"/></svg>
          </button>
          <button id="previewAndPrint" aria-label="Download poster" title="Download poster">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11M7.5 9.5L12 14l4.5-4.5M5 20h14"/></svg>
          </button>
          <button id="autoRotateToggle" class="nav-toggle" aria-label="Toggle auto-rotate" aria-pressed="false" title="Auto-rotate">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 12a8.5 8.5 0 1 1-2.49-6.01"/><path d="M20.5 4v4h-4"/></svg>
          </button>
          <button id="turntableToggle" class="nav-toggle" aria-label="Toggle turntable (drag to rotate)" aria-pressed="false" title="Turntable (drag to rotate)">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.3" style="fill:currentColor;stroke:none"/><ellipse cx="12" cy="12" rx="10" ry="4.2" transform="rotate(-28 12 12)"/></svg>
          </button>
          <button id="projectionToggle" class="nav-toggle" aria-label="Toggle perspective / parallel projection" aria-pressed="false" title="Projection">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.8l8.2 4.6v9.2L12 21.2 3.8 16.6V7.4z"/><path d="M3.9 7.5l8.1 4.6 8.1-4.6M12 12.1v9"/></svg>
          </button>
          <button id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path style="fill:currentColor;stroke:none" d="M12 3.5a8.5 8.5 0 0 1 0 17z"/></svg>
          </button>
          <button id="settingsToggle" aria-label="Open settings" title="Settings">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h8M16 17h4"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="14" cy="17" r="2"/></svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Text Display + frequency dock (top card on desktop, bottom dock on mobile) -->
    <div id="textDisplayWrapper">
      <div id="textDisplay" contenteditable="true" role="textbox" aria-label="Type a phrase"></div>
      <button id="clearButton" type="button" aria-label="Clear text" title="Clear text" style="display: none;">
        <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
      </button>
      <div class="text-display-meta">
        <div id="typingSpeed">0 WPM</div>
        <div id="characterCount">0/90 characters</div>
      </div>
      <div id="characterBar">
        <div id="characterBarSegments"></div>
      </div>
    </div>

    <!-- Font Drawer -->
    <div id="fontDrawer" class="font-drawer" aria-hidden="true">
      <div id="fontDrawerBackdrop" class="font-drawer-backdrop" role="presentation"></div>
      <aside id="fontDrawerPanel" class="font-drawer-panel" role="dialog" aria-labelledby="fontDrawerTitle">
        <div class="font-drawer-header">
          <div>
            <p id="fontDrawerTitle">Font Library</p>
            <p class="font-drawer-subtitle">Discover & pin your favorite typefaces</p>
          </div>
          <button id="fontDrawerClose" class="font-drawer-close" aria-label="Close font library">×</button>
        </div>

        <section class="font-drawer-favorites">
          <div class="font-drawer-favorites-head">
            <span>Pinned Fonts</span>
            <span id="favoriteCount">0 / 5</span>
          </div>
          <div id="favoriteFontsList" class="favorite-fonts-list"></div>
        </section>

        <section class="font-drawer-controls">
          <div class="font-search-wrapper">
            <input type="search" id="fontSearchInput" placeholder="Search 1500+ fonts..." aria-label="Search fonts" />
            <button id="fontSearchClear" type="button" class="search-clear-btn" aria-label="Clear search">×</button>
          </div>
          
          <div class="font-filters">
            <div class="filter-group">
              <label for="fontCategoryFilter">Category</label>
              <select id="fontCategoryFilter">
                <option value="all">All</option>
                <option value="sans-serif">Sans Serif</option>
                <option value="serif">Serif</option>
                <option value="display">Display</option>
                <option value="handwriting">Handwriting</option>
                <option value="monospace">Monospace</option>
              </select>
            </div>
            
            <div class="filter-group">
              <label for="fontSortFilter">Sort by</label>
              <select id="fontSortFilter">
                <option value="popularity">Popularity</option>
                <option value="alphabetical">A-Z</option>
                <option value="trending">Trending</option>
                <option value="date">Recently Added</option>
              </select>
            </div>
          </div>

          <div class="preview-text-control">
            <label for="previewTextInput">Preview Text</label>
            <input type="text" id="previewTextInput" value="Bend the grid. Break the rules." maxlength="60" />
          </div>

          <div class="preview-options">
            <label>
              <input type="checkbox" id="showAllWeightsToggle" />
              <span>Show all weights</span>
            </label>
            <label id="weightLayoutLabel" class="hidden">
              <input type="checkbox" id="weightLayoutToggle" />
              <span>Vertical layout</span>
            </label>
          </div>

          <div class="weight-filter-section hidden" id="weightFilterSection">
            <label for="weightFilterSelect">Focus Weight</label>
            <select id="weightFilterSelect">
              <option value="">All weights</option>
              <option value="100">Thin (100)</option>
              <option value="200">Extra Light (200)</option>
              <option value="300">Light (300)</option>
              <option value="400" selected>Regular (400)</option>
              <option value="500">Medium (500)</option>
              <option value="600">Semi Bold (600)</option>
              <option value="700">Bold (700)</option>
              <option value="800">Extra Bold (800)</option>
              <option value="900">Black (900)</option>
            </select>
          </div>

          <div class="variant-filter-section hidden" id="variantFilterSection">
            <label>Style Variants</label>
            <div class="variant-filters">
              <label>
                <input type="checkbox" id="showItalicToggle" />
                <span>Italic</span>
              </label>
              <label>
                <input type="checkbox" id="showCondensedToggle" />
                <span>Condensed</span>
              </label>
              <label>
                <input type="checkbox" id="showExtendedToggle" />
                <span>Extended</span>
              </label>
            </div>
          </div>
        </section>

        <div id="fontDrawerNotice" class="font-drawer-notice hidden"></div>

        <div class="font-library-wrapper">
          <section id="fontLibraryList" class="font-drawer-list">
            <div class="font-drawer-loading">
              <div class="loading-spinner"></div>
              <p>Loading Google Fonts...</p>
            </div>
          </section>

          <!-- A-Z Quick Jump Navigation -->
          <nav class="az-scroll-guide hidden" id="azScrollGuide" aria-label="Quick jump to letter">
            <button data-letter="A" title="Jump to A">A</button>
            <button data-letter="B" title="Jump to B">B</button>
            <button data-letter="C" title="Jump to C">C</button>
            <button data-letter="D" title="Jump to D">D</button>
            <button data-letter="E" title="Jump to E">E</button>
            <button data-letter="F" title="Jump to F">F</button>
            <button data-letter="G" title="Jump to G">G</button>
            <button data-letter="H" title="Jump to H">H</button>
            <button data-letter="I" title="Jump to I">I</button>
            <button data-letter="J" title="Jump to J">J</button>
            <button data-letter="K" title="Jump to K">K</button>
            <button data-letter="L" title="Jump to L">L</button>
            <button data-letter="M" title="Jump to M">M</button>
            <button data-letter="N" title="Jump to N">N</button>
            <button data-letter="O" title="Jump to O">O</button>
            <button data-letter="P" title="Jump to P">P</button>
            <button data-letter="Q" title="Jump to Q">Q</button>
            <button data-letter="R" title="Jump to R">R</button>
            <button data-letter="S" title="Jump to S">S</button>
            <button data-letter="T" title="Jump to T">T</button>
            <button data-letter="U" title="Jump to U">U</button>
            <button data-letter="V" title="Jump to V">V</button>
            <button data-letter="W" title="Jump to W">W</button>
            <button data-letter="X" title="Jump to X">X</button>
            <button data-letter="Y" title="Jump to Y">Y</button>
            <button data-letter="Z" title="Jump to Z">Z</button>
          </nav>
        </div>
      </aside>
    </div>


    <div id="previewModal" role="dialog" aria-modal="true" aria-label="Poster preview">
      <div id="previewContent">
        <div id="previewHeader">
          <span class="preview-title">Poster</span>
          <button id="closePreview" class="preview-close" type="button" aria-label="Close preview">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <div id="previewImageContainer">
          <img id="previewImage" alt="Poster preview" />
        </div>
        <div id="previewControls">
          <button id="printFromPreview" type="button">
            <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11M7.5 9.5L12 14l4.5-4.5M5 20h14"/></svg>
            <span>Download poster</span>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/main.ts"></script>
  </body>
</html>
